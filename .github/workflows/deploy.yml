name: Build & Deploy

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: ["Forecast Pipeline"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Download forecast data (from triggering run)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: forecast-data
          path: frontend/public/data/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find latest forecast run (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: find-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow="Forecast Pipeline" \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful Forecast Pipeline run found"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Found latest forecast run: $RUN_ID"

      - name: Download forecast data (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: forecast-data
          path: frontend/public/data/
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React SPA
        timeout-minutes: 10
        run: |
          cd frontend
          npm ci --prefer-offline
          npm run build

      - name: Deploy to Vercel
        timeout-minutes: 10
        run: |
          npm install -g vercel@39.3.0
          if vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel_output.txt; then
            echo "Deploy succeeded"
          elif grep -qi 'rate\|429\|too many\|throttl' /tmp/vercel_output.txt; then
            echo "::warning::Vercel deploy rate limited — will retry on next run"
          else
            echo "::error::Vercel deploy failed"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
