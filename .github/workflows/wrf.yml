name: WRF Download & Analysis

permissions:
  contents: read

on:
  schedule:
    # 4x daily — 45 min after each CWA model cycle (00, 06, 12, 18 UTC)
    - cron: '45 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if CWA cycle is unchanged'
        required: false
        type: boolean
        default: false

concurrency:
  group: wrf-pipeline
  cancel-in-progress: true

jobs:
  wrf-download:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes-dev
          pip install --quiet -r requirements.txt
          pip install --quiet pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Download and subset WRF data
        id: download
        timeout-minutes: 30
        run: |
          python taiwan_wrf_download.py --keelung-only --workers 8

      - name: Report archive size
        if: steps.download.outputs.archive_path != ''
        run: |
          ARCHIVE="${{ steps.download.outputs.archive_path }}"
          if [ -f "$ARCHIVE" ]; then
            echo "archive_size=$(du -sh "$ARCHIVE" | cut -f1)" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Firebase credentials
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          if [ -n "$SA_KEY" ]; then
            echo "$SA_KEY" > /tmp/firebase-sa-key.json
            chmod 600 /tmp/firebase-sa-key.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa-key.json" >> "$GITHUB_ENV"
            echo "FIREBASE_PROJECT=$FIREBASE_PROJECT" >> "$GITHUB_ENV"
            echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> "$GITHUB_ENV"
          else
            echo "::warning::FIREBASE_SA_KEY not set — Firebase storage disabled"
          fi

      - name: Fetch previous run summary
        id: prev_summary
        timeout-minutes: 5
        run: |
          python firebase_storage.py download-summary \
            --output keelung_summary.json 2>/dev/null || true
          if [ -f keelung_summary.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for new CWA run
        id: stale_check
        run: |
          NEW_INIT="${{ steps.download.outputs.init_utc }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.prev_summary.outputs.found }}" = "true" ] && [ -f keelung_summary.json ]; then
            PREV_INIT=$(python3 -c \
              "import json,sys; d=json.load(open('keelung_summary.json')); print(d.get('meta',{}).get('init_utc',''))" \
              2>/dev/null || echo "")
            if [ -n "$PREV_INIT" ] && [ "$NEW_INIT" = "$PREV_INIT" ]; then
              echo "is_new=false" >> "$GITHUB_OUTPUT"
            else
              echo "is_new=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: List GRIB2 variables (diagnostic)
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          FIRST=$(ls "$RUNDIR"/*_keelung*.grb2 2>/dev/null | sort | head -1)
          if [ -n "$FIRST" ]; then
            python wrf_analyze.py --rundir "$RUNDIR" --list-vars 2>&1 || true
          fi

      # Fetch ECMWF + wave + tide in parallel (all independent, Keelung only)
      - name: Fetch ECMWF, wave, and tides (parallel)
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          python ecmwf_fetch.py --output ecmwf_keelung.json &
          PID_ECMWF=$!
          python wave_fetch.py --output wave_keelung.json &
          PID_WAVE=$!
          python tide_predict.py --output tide_keelung.json --days 7 &
          PID_TIDE=$!
          wait $PID_ECMWF || echo "::warning::ECMWF fetch failed"
          wait $PID_WAVE || echo "::warning::Wave fetch failed"
          wait $PID_TIDE || echo "::warning::Tide prediction failed"
          true

      - name: Analyze Keelung forecast
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 10
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          PREV_ARG=""
          if [ "${{ steps.prev_summary.outputs.found }}" = "true" ]; then
            PREV_ARG="--prev-json keelung_summary.json"
          fi
          ECMWF_ARG=""; [ -f ecmwf_keelung.json ] && ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          WAVE_ARG=""; [ -f wave_keelung.json ] && WAVE_ARG="--wave-json wave_keelung.json"
          TIDE_ARG=""; [ -f tide_keelung.json ] && TIDE_ARG="--tide-json tide_keelung.json"

          # Download accuracy log from Firestore
          python firebase_storage.py download-accuracy-log \
            --output accuracy_log.json 2>/dev/null || true
          ACCURACY_ARG=""; [ -f accuracy_log.json ] && ACCURACY_ARG="--accuracy-log accuracy_log.json"

          python wrf_analyze.py \
            --rundir "$RUNDIR" \
            $PREV_ARG $ECMWF_ARG $WAVE_ARG $TIDE_ARG $ACCURACY_ARG \
            --output-json keelung_summary_new.json \
            --output-html forecast.html \
            --output-wind-grid wind_grid_wrf.json \
            --output-spots-json wrf_spots.json

      # Upload WRF summary + archive to Firebase for the forecast workflow to use.
      # Summary upload is the critical path — if it fails, the forecast pipeline
      # keeps serving an old init_utc. Do NOT swallow its exit code.
      - name: Upload archive to Firebase
        id: upload_archive
        if: steps.stale_check.outputs.is_new == 'true' && steps.download.outputs.archive_path != ''
        continue-on-error: true
        timeout-minutes: 10
        run: |
          python firebase_storage.py upload-archive \
            --input "${{ steps.download.outputs.archive_path }}"
          python firebase_storage.py cleanup-archives \
            --keep "${{ steps.download.outputs.archive_name }}" || true

      - name: Upload summary to Firebase
        id: upload_summary
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        run: |
          python firebase_storage.py upload-summary \
            --input keelung_summary_new.json
          if [ -f wrf_spots.json ]; then
            python firebase_storage.py upload-wrf-spots \
              --input wrf_spots.json
          fi

      - name: Record WRF pipeline health
        if: always()
        continue-on-error: true
        timeout-minutes: 1
        env:
          IS_NEW: ${{ steps.stale_check.outputs.is_new }}
          UPLOAD_SUMMARY: ${{ steps.upload_summary.outcome }}
          UPLOAD_ARCHIVE: ${{ steps.upload_archive.outcome }}
          INIT_UTC: ${{ steps.download.outputs.init_utc }}
        run: |
          python -c "
          from firebase_storage import record_pipeline_health
          import os
          record_pipeline_health(
              'wrf-' + os.environ.get('GITHUB_RUN_ID', 'local'),
              {'stage': 'wrf',
               'init_utc': os.environ.get('INIT_UTC') or None,
               'is_new_cycle': os.environ.get('IS_NEW') == 'true',
               'upload_summary': os.environ.get('UPLOAD_SUMMARY') or 'skipped',
               'upload_archive': os.environ.get('UPLOAD_ARCHIVE') or 'skipped'}
          )
          "
