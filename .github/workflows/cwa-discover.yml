name: CWA Station Discovery

on:
  schedule:
    # Run on the 1st of each month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes-dev
          pip install --quiet -r requirements.txt

      - name: Discover CWA stations and buoys
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          python cwa_discover.py --output cwa_stations.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cwa_stations.json
          if git diff --cached --quiet; then
            echo "No changes to cwa_stations.json"
          else
            git commit -m "Update CWA station/buoy mapping (monthly discovery)"
            git push
          fi
