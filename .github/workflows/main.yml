name: Taiwan WRF Download

permissions:
  contents: read

on:
  schedule:
    # Runs 45 min after each CWA model cycle (00/06/12/18 UTC)
    - cron: '45 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if CWA cycle is unchanged'
        required: false
        type: boolean
        default: false

concurrency:
  group: wrf-pipeline
  cancel-in-progress: true

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Cache pip downloads — saves ~4 s on repeated runs (eccodes wheel is large)
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # Install ALL system deps + Python deps in a single apt pass.
      # --no-install-recommends shaves ~15 MB of docs/extras off the download.
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes-dev
          pip install --quiet -r requirements.txt
          pip install --quiet pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      # Download, subset, and capture outputs for later steps.
      # taiwan_wrf_download.py writes rundir + init_utc to GITHUB_OUTPUT directly;
      # the shell commands below add archive_path / archive_name / archive_size as
      # a belt-and-suspenders fallback (identical values, different key names).
      # taiwan_wrf_download.py writes archive_name, archive_path, archive_size_mb,
      # rundir, and init_utc to GITHUB_OUTPUT directly.  The grep below reads
      # archive_path back from GITHUB_OUTPUT (since step outputs aren't available
      # within the same step) to add the human-readable archive_size.
      - name: Download and subset WRF data
        id: download
        timeout-minutes: 30
        run: |
          python taiwan_wrf_download.py --keelung-only --workers 8
          ARCHIVE=$(grep '^archive_path=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          if [ -n "$ARCHIVE" ] && [ -f "$ARCHIVE" ]; then
            echo "archive_size=$(du -sh "$ARCHIVE" | cut -f1)" >> "$GITHUB_OUTPUT"
          fi

      # ── Configure Firebase credentials ───────────────────────────────────────
      - name: Configure Firebase credentials
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
        run: |
          if [ -n "$SA_KEY" ]; then
            echo "$SA_KEY" > /tmp/firebase-sa-key.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa-key.json" >> "$GITHUB_ENV"
            echo "FIREBASE_PROJECT=$FIREBASE_PROJECT" >> "$GITHUB_ENV"
            echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> "$GITHUB_ENV"
          else
            echo "::warning::FIREBASE_SA_KEY not set — Firebase storage disabled"
          fi

      # ── Pull previous run summary from Firestore for delta comparison ────────
      # On the very first run this step silently produces nothing.
      - name: Fetch previous run summary
        id: prev_summary
        timeout-minutes: 5
        run: |
          python firebase_storage.py download-summary \
            --output keelung_summary.json 2>/dev/null || true
          if [ -f keelung_summary.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "  Previous summary fetched from Firestore."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "  No previous summary found (first run?)."
          fi

      # ── Stale-run detection ───────────────────────────────────────────────────
      # Compare the CWA init_utc just downloaded against the one stored in the
      # previous summary.  If they match, the model hasn't published a new cycle
      # yet — skip everything downstream so we don't re-deploy or
      # re-upload identical data.
      - name: Check for new CWA run
        id: stale_check
        run: |
          NEW_INIT="${{ steps.download.outputs.init_utc }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "  ✅  Force flag set — skipping stale check."
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.prev_summary.outputs.found }}" = "true" ] && [ -f keelung_summary.json ]; then
            PREV_INIT=$(python3 -c \
              "import json,sys; d=json.load(open('keelung_summary.json')); print(d.get('meta',{}).get('init_utc',''))" \
              2>/dev/null || echo "")
            if [ -n "$PREV_INIT" ] && [ "$NEW_INIT" = "$PREV_INIT" ]; then
              echo "  ⏭  Same CWA init ($NEW_INIT) as previous run — skipping downstream steps."
              echo "is_new=false" >> "$GITHUB_OUTPUT"
            else
              echo "  ✅  New CWA run: $NEW_INIT  (prev: $PREV_INIT)"
              echo "is_new=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "  ✅  No previous summary — treating as new run."
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Fetch ECMWF IFS point forecast from Open-Meteo ───────────────────────
      # No API key required. Uses only stdlib so no extra pip install needed.
      # Produces ecmwf_keelung.json for side-by-side comparison with WRF.
      - name: Fetch ECMWF forecast
        id: ecmwf
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 7
        run: |
          python ecmwf_fetch.py --output ecmwf_keelung.json
          echo "ecmwf_json=ecmwf_keelung.json" >> "$GITHUB_OUTPUT"

      # ── Fetch wave forecasts from Open-Meteo marine API ──────────────────────
      # Produces wave_keelung.json (ECMWF WAM wave data always; CWA wave if model
      # ID is known).  To add CWA wave data once you find the right model ID,
      # append:  --cwa-wave-model M-W0061  (or whatever the correct ID turns out
      # to be — run wave_fetch.py --cwa-wave-model <ID> --list-wave-vars locally
      # to probe the CWA S3 bucket and inspect the GRIB2 variable names).
      - name: Fetch wave forecast
        id: wave
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 7
        run: |
          python wave_fetch.py --output wave_keelung.json
          echo "wave_json=wave_keelung.json" >> "$GITHUB_OUTPUT"

      # ── Predict tides for Keelung harbour ─────────────────────────────────────
      # Uses harmonic analysis (no API key needed). Produces tide_keelung.json.
      - name: Predict tides
        id: tide
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 2
        run: |
          python tide_predict.py --output tide_keelung.json --days 7

      # ── Fetch CWA real-time observations ──────────────────────────────────────
      # Station (Keelung #466940) + wave buoy (Longdong) + tide + warnings.
      # These are used by: AI summary (ground truth), accuracy tracking (buoy
      # verification), and the HTML display (current conditions).
      # Non-blocking: pipeline continues if CWA API is unavailable.
      - name: Fetch CWA observations
        id: cwa_obs
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 3
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          if [ -n "$CWA_OPENDATA_KEY" ]; then
            python cwa_fetch.py --output cwa_obs.json
            if [ -f cwa_obs.json ]; then
              echo "  ✅  CWA observations fetched"
              echo "cwa_obs_json=cwa_obs.json" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "  ⏭  No CWA_OPENDATA_KEY — skipping CWA observations"
          fi

      # ── Diagnostic: list GRIB2 variables in first subset file ────────────────
      # Captures the (shortName, typeOfLevel, level) inventory to a file so it
      # can be included in the HTML output.  Helps diagnose missing variables (gusts,
      # rain, cloud, vis, CAPE) without having to dig through Actions logs.
      - name: List GRIB2 variables (diagnostic)
        id: grib_vars
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          FIRST=$(ls "$RUNDIR"/*_keelung*.grb2 2>/dev/null | sort | head -1)
          if [ -n "$FIRST" ]; then
            echo "=== GRIB2 variable inventory: $(basename "$FIRST") ===" | tee /tmp/grib_vars.txt
            python wrf_analyze.py --rundir "$RUNDIR" --list-vars 2>&1 | tee -a /tmp/grib_vars.txt || true
          else
            echo "No keelung grb2 files found." | tee /tmp/grib_vars.txt
          fi
          # Wrap in an HTML <details> block and write to a temp file (not GITHUB_OUTPUT)
          # so it can be cat'd into the HTML output without hitting output size limits.
          {
            printf '<details style="margin-top:16px"><summary style="font-family:Arial,sans-serif;font-size:12px;color:#718096;cursor:pointer">🔍 GRIB2 variable inventory (click to expand)</summary>'
            printf '<pre style="font-family:monospace;font-size:11px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:4px;padding:8px;overflow-x:auto;margin:4px 0">'
            cat /tmp/grib_vars.txt | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            printf '</pre></details>\n'
          } > /tmp/grib_vars_wrapped.html

      # ── Fetch multi-model ensemble ─────────────────────────────────────────
      # GFS + ICON + JMA global models for confidence indicators.
      # Non-blocking: pipeline continues if ensemble fetch fails.
      - name: Fetch ensemble models
        id: ensemble
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        continue-on-error: true
        run: |
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          python ensemble_fetch.py $ECMWF_ARG --output ensemble_keelung.json

      # ── Generate surf forecast & planner JSON ───────────────────────────────
      # Fetches ECMWF + marine data for all 7 surf spots plus Keelung sailing.
      # Outputs: surf_forecast.html (spots section) + surf_planner.json (for day cards).
      # Runs BEFORE wrf_analyze so the planner JSON is available for unified day cards.
      - name: Generate surf forecast
        id: surf
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 10
        run: |
          CWA_TIDE_ARG=""
          if [ -f cwa_obs.json ]; then
            CWA_TIDE_ARG="--cwa-obs cwa_obs.json"
          fi
          python surf_forecast.py --output surf_forecast.html --output-json surf_planner.json --output-dir public $CWA_TIDE_ARG

      # ── Run GRIB2 point-forecast analysis ────────────────────────────────────
      # Reads the Keelung subset .grb2 files, extracts the point forecast,
      # diffs against the previous run, and writes forecast.html.
      # Consumes surf_planner.json to build unified day cards (sailing + surf).
      - name: Analyze Keelung forecast
        id: analyze
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 10
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          PREV_ARG=""
          if [ "${{ steps.prev_summary.outputs.found }}" = "true" ]; then
            PREV_ARG="--prev-json keelung_summary.json"
          fi
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          TIDE_ARG=""
          if [ -f tide_keelung.json ]; then
            TIDE_ARG="--tide-json tide_keelung.json"
          fi
          SURF_ARG=""
          if [ -f surf_planner.json ]; then
            SURF_ARG="--surf-json surf_planner.json"
          fi
          ENSEMBLE_ARG=""
          if [ -f ensemble_keelung.json ]; then
            ENSEMBLE_ARG="--ensemble-json ensemble_keelung.json"
          fi
          # Download accuracy log from Firestore (for badge display)
          python firebase_storage.py download-accuracy-log \
            --output accuracy_log.json 2>/dev/null || true
          ACCURACY_ARG=""
          if [ -f accuracy_log.json ]; then
            ACCURACY_ARG="--accuracy-log accuracy_log.json"
          fi
          CWA_OBS_ARG=""
          if [ -f cwa_obs.json ]; then
            CWA_OBS_ARG="--cwa-obs cwa_obs.json"
          fi
          python wrf_analyze.py \
            --rundir "$RUNDIR" \
            $PREV_ARG \
            $ECMWF_ARG \
            $WAVE_ARG \
            $TIDE_ARG \
            $SURF_ARG \
            $ENSEMBLE_ARG \
            $ACCURACY_ARG \
            $CWA_OBS_ARG \
            --output-json keelung_summary_new.json \
            --output-html forecast.html \
            --output-dir public

      # ── Generate AI forecast summary ──────────────────────────────────────────
      # Calls Anthropic API to produce a plain-English narrative from the
      # JSON forecast data.  Gracefully skips if API key is not set.
      - name: Generate AI forecast summary
        id: ai_summary
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 15
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          ACCURACY_ARG=""
          if [ -f accuracy_log.json ]; then
            ACCURACY_ARG="--accuracy-log accuracy_log.json"
          fi
          CWA_ARG=""
          if [ -f cwa_obs.json ]; then
            CWA_ARG="--cwa-obs cwa_obs.json"
          fi
          ENSEMBLE_ARG=""
          if [ -f ensemble_keelung.json ]; then
            ENSEMBLE_ARG="--ensemble-json ensemble_keelung.json"
          fi
          python forecast_summary.py \
            --wrf-json keelung_summary_new.json \
            $ECMWF_ARG \
            $WAVE_ARG \
            $ACCURACY_ARG \
            $CWA_ARG \
            $ENSEMBLE_ARG \
            --output ai_summary.html

          # Prepend AI summary to the legacy forecast HTML
          if [ -s ai_summary.html ] && [ -f forecast.html ]; then
            cat ai_summary.html forecast.html > forecast.html.tmp && mv forecast.html.tmp forecast.html
            echo "  ✅  AI summary prepended to forecast HTML"
          else
            echo "  ⏭  No AI summary generated (API key missing or error)"
          fi

          # Re-generate dashboard page with AI summary embedded
          if [ -s ai_summary.html ] && [ -d public ]; then
            RUNDIR="${{ steps.download.outputs.rundir }}"
            PREV_ARG=""
            if [ "${{ steps.prev_summary.outputs.found }}" = "true" ]; then
              PREV_ARG="--prev-json keelung_summary.json"
            fi
            ECMWF_ARG=""; [ -f ecmwf_keelung.json ] && ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
            WAVE_ARG=""; [ -f wave_keelung.json ] && WAVE_ARG="--wave-json wave_keelung.json"
            TIDE_ARG=""; [ -f tide_keelung.json ] && TIDE_ARG="--tide-json tide_keelung.json"
            SURF_ARG=""; [ -f surf_planner.json ] && SURF_ARG="--surf-json surf_planner.json"
            ENSEMBLE_ARG=""; [ -f ensemble_keelung.json ] && ENSEMBLE_ARG="--ensemble-json ensemble_keelung.json"
            ACCURACY_ARG=""; [ -f accuracy_log.json ] && ACCURACY_ARG="--accuracy-log accuracy_log.json"
            CWA_OBS_ARG=""; [ -f cwa_obs.json ] && CWA_OBS_ARG="--cwa-obs cwa_obs.json"
            python wrf_analyze.py \
              --rundir "$RUNDIR" \
              $PREV_ARG $ECMWF_ARG $WAVE_ARG $TIDE_ARG $SURF_ARG \
              $ENSEMBLE_ARG $ACCURACY_ARG $CWA_OBS_ARG \
              --output-json keelung_summary_new.json \
              --output-html forecast.html \
              --output-dir public \
              --ai-summary ai_summary.html
            echo "  ✅  Dashboard re-generated with AI summary"
          fi

      # ── Send threshold-based alerts ─────────────────────────────────────────
      # Sends LINE/Telegram notifications when dangerous conditions are forecast.
      # Non-blocking: pipeline continues if notification fails or no tokens set.
      - name: Send forecast alerts
        id: notify
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 2
        continue-on-error: true
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          python notify.py \
            --wrf-json keelung_summary_new.json \
            $WAVE_ARG

      # ── Track forecast accuracy ──────────────────────────────────────────────
      # Compares past forecast records against Open-Meteo + CWA observations.
      # Non-blocking: pipeline continues if accuracy check fails.
      - name: Track forecast accuracy
        id: accuracy
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 3
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          # accuracy_log.json was already downloaded by the Analyze step above;
          # reuse it from the working directory instead of re-downloading.
          EXISTING=""
          if [ -f accuracy_log.json ]; then
            EXISTING="--existing-log accuracy_log.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          # If CWA obs were already fetched earlier, pass the key so
          # accuracy_track can use live buoy data for wave verification
          CWA_OBS_ARG=""
          if [ -f cwa_obs.json ]; then
            CWA_OBS_ARG="--cwa-obs-json cwa_obs.json"
          fi
          python accuracy_track.py \
            --forecast-json keelung_summary_new.json \
            $EXISTING \
            $WAVE_ARG \
            $CWA_OBS_ARG \
            --output accuracy_log.json
          echo "  ✅  Accuracy tracking complete"

      # ── Upload archive + summary to Firebase ──────────────────────────────────
      - name: Upload to Firebase
        id: upload
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 10
        run: |
          ARCHIVE_NAME="${{ steps.download.outputs.archive_name }}"

          # Upload GRIB2 archive to Cloud Storage
          LINK=$(python firebase_storage.py upload-archive \
            --input "${{ steps.download.outputs.archive_path }}" 2>/dev/null || echo "")
          echo "drive_link=$LINK" >> "$GITHUB_OUTPUT"

          # Remove previous archives (keep only the current run)
          python firebase_storage.py cleanup-archives \
            --keep "$ARCHIVE_NAME" 2>/dev/null || true

          # Upload summary to Firestore (used as prev-json next run)
          python firebase_storage.py upload-summary \
            --input keelung_summary_new.json

          # Upload accuracy log to Firestore (if generated)
          # Note: accuracy_track.py already writes to Firestore directly,
          # but this ensures the full log is available even if that step failed
          if [ -f accuracy_log.json ]; then
            python firebase_storage.py upload-accuracy-log \
              --input accuracy_log.json
          fi

      # ── Build & deploy to Vercel ──────────────────────────────────────────────
      # Python scripts (wrf_analyze.py --output-dir, surf_forecast.py --output-dir)
      # already generated complete HTML pages in public/.
      # This step just copies static PWA assets alongside them.
      - name: Build Vercel site
        if: steps.stale_check.outputs.is_new == 'true' && !cancelled()
        timeout-minutes: 5
        run: |
          mkdir -p public/spots
          # PWA + design system assets
          cp pwa/manifest.json pwa/sw.js pwa/app.js pwa/icon-192.png pwa/icon-512.png pwa/styles.css public/

          echo "Multi-page site structure:"
          find public -type f -name '*.html' | sort
          echo "Static assets:"
          ls -la public/*.css public/*.js public/*.json 2>/dev/null || true

      - name: Deploy to Vercel
        if: steps.stale_check.outputs.is_new == 'true' && !cancelled()
        timeout-minutes: 10
        run: |
          npm install -g vercel@39.3.0
          if vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel_output.txt; then
            echo "Deploy succeeded"
          elif grep -qi 'rate\|429\|too many\|throttl' /tmp/vercel_output.txt; then
            echo "::warning::Vercel deploy rate limited — will retry on next scheduled run"
          else
            echo "::error::Vercel deploy failed"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
