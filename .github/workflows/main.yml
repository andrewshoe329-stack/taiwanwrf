name: Taiwan WRF Download

on:
  schedule:
    # Runs 45 min after each CWA model cycle (00/06/12/18 UTC)
    - cron: '45 0,6,12,18 * * *'
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ecCodes C library and Python dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libeccodes-dev
          pip install eccodes numpy

      - name: Download and subset WRF data
        run: |
          python taiwan_wrf_download.py --keelung-only

      - name: Set up rclone
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Upload subset files to Google Drive
        run: |
          rclone copy wrf_downloads/ gdrive:WRF_Taiwan/ \
            --include "*keelung*" \
            --transfers 4 \
            --stats 10s
