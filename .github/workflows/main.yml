name: Taiwan WRF Download

on:
  schedule:
    # Runs 45 min after each CWA model cycle (00/06/12/18 UTC)
    - cron: '45 0,6,12,18 * * *'
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Cache pip downloads — saves ~4 s on repeated runs (eccodes wheel is large)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-eccodes-numpy-${{ runner.os }}

      # Install ALL system deps + Python deps in a single apt pass.
      # --no-install-recommends shaves ~15 MB of docs/extras off the download.
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes-dev rclone
          pip install --quiet eccodes numpy

      # Download, subset, and capture outputs for later steps.
      # taiwan_wrf_download.py writes rundir + init_utc to GITHUB_OUTPUT directly;
      # the shell commands below add archive_path / archive_name / archive_size as
      # a belt-and-suspenders fallback (identical values, different key names).
      - name: Download and subset WRF data
        id: download
        run: |
          python taiwan_wrf_download.py --keelung-only --workers 8
          ARCHIVE=$(find wrf_downloads/ -name "*.tar.gz" | sort | tail -1)
          echo "archive_path=$ARCHIVE"               >> "$GITHUB_OUTPUT"
          echo "archive_name=$(basename "$ARCHIVE")"  >> "$GITHUB_OUTPUT"
          echo "archive_size=$(du -sh "$ARCHIVE" | cut -f1)" >> "$GITHUB_OUTPUT"

      # Configure rclone from the stored secret
      - name: Configure rclone
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

      # ── Pull previous run summary from Drive for delta comparison ─────────────
      # keelung_summary.json is stored at gdrive:WRF_Taiwan/keelung_summary.json
      # On the very first run this step silently produces nothing.
      - name: Fetch previous run summary
        id: prev_summary
        run: |
          rclone copy gdrive:WRF_Taiwan/keelung_summary.json . \
            --no-traverse 2>/dev/null || true
          if [ -f keelung_summary.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "  Previous summary fetched."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "  No previous summary found (first run?)."
          fi

      # ── Stale-run detection ───────────────────────────────────────────────────
      # Compare the CWA init_utc just downloaded against the one stored in the
      # previous summary.  If they match, the model hasn't published a new cycle
      # yet — skip everything downstream so we don't send duplicate emails or
      # re-upload identical data.
      - name: Check for new CWA run
        id: stale_check
        run: |
          NEW_INIT="${{ steps.download.outputs.init_utc }}"
          if [ "${{ steps.prev_summary.outputs.found }}" = "true" ] && [ -f keelung_summary.json ]; then
            PREV_INIT=$(python3 -c \
              "import json,sys; d=json.load(open('keelung_summary.json')); print(d.get('meta',{}).get('init_utc',''))" \
              2>/dev/null || echo "")
            if [ -n "$PREV_INIT" ] && [ "$NEW_INIT" = "$PREV_INIT" ]; then
              echo "  ⏭  Same CWA init ($NEW_INIT) as previous run — skipping downstream steps."
              echo "is_new=false" >> "$GITHUB_OUTPUT"
            else
              echo "  ✅  New CWA run: $NEW_INIT  (prev: $PREV_INIT)"
              echo "is_new=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "  ✅  No previous summary — treating as new run."
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Fetch ECMWF IFS point forecast from Open-Meteo ───────────────────────
      # No API key required. Uses only stdlib so no extra pip install needed.
      # Produces ecmwf_keelung.json for side-by-side comparison with WRF.
      - name: Fetch ECMWF forecast
        id: ecmwf
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          python ecmwf_fetch.py --output ecmwf_keelung.json
          echo "ecmwf_json=ecmwf_keelung.json" >> "$GITHUB_OUTPUT"

      # ── Fetch wave forecasts from Open-Meteo marine API ──────────────────────
      # Produces wave_keelung.json (ECMWF WAM wave data always; CWA wave if model
      # ID is known).  To add CWA wave data once you find the right model ID,
      # append:  --cwa-wave-model M-W0061  (or whatever the correct ID turns out
      # to be — run wave_fetch.py --cwa-wave-model <ID> --list-wave-vars locally
      # to probe the CWA S3 bucket and inspect the GRIB2 variable names).
      - name: Fetch wave forecast
        id: wave
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          python wave_fetch.py --output wave_keelung.json
          echo "wave_json=wave_keelung.json" >> "$GITHUB_OUTPUT"

      # ── Diagnostic: list GRIB2 variables in first subset file ────────────────
      # Captures the (shortName, typeOfLevel, level) inventory to a file so it
      # can be included in the email.  Helps diagnose missing variables (gusts,
      # rain, cloud, vis, CAPE) without having to dig through Actions logs.
      - name: List GRIB2 variables (diagnostic)
        id: grib_vars
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          FIRST=$(ls "$RUNDIR"/*_keelung*.grb2 2>/dev/null | sort | head -1)
          if [ -n "$FIRST" ]; then
            echo "=== GRIB2 variable inventory: $(basename $FIRST) ===" | tee /tmp/grib_vars.txt
            python wrf_analyze.py --rundir "$RUNDIR" --list-vars 2>&1 | tee -a /tmp/grib_vars.txt || true
          else
            echo "No keelung grb2 files found." | tee /tmp/grib_vars.txt
          fi
          # Wrap in an HTML <details> block and write to a temp file (not GITHUB_OUTPUT)
          # so it can be cat'd into the email body without hitting output size limits.
          {
            printf '<details style="margin-top:16px"><summary style="font-family:Arial,sans-serif;font-size:12px;color:#718096;cursor:pointer">🔍 GRIB2 variable inventory (click to expand)</summary>'
            printf '<pre style="font-family:monospace;font-size:11px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:4px;padding:8px;overflow-x:auto;margin:4px 0">'
            cat /tmp/grib_vars.txt | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            printf '</pre></details>\n'
          } > /tmp/grib_vars_wrapped.html

      # ── Run GRIB2 point-forecast analysis ────────────────────────────────────
      # Reads the Keelung subset .grb2 files, extracts the point forecast,
      # diffs against the previous run, and writes email_analysis.html.
      # Appends: WRF vs ECMWF atmospheric comparison, and wave forecast section.
      - name: Analyze Keelung forecast
        id: analyze
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          PREV_ARG=""
          if [ "${{ steps.prev_summary.outputs.found }}" = "true" ]; then
            PREV_ARG="--prev-json keelung_summary.json"
          fi
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          python wrf_analyze.py \
            --rundir "$RUNDIR" \
            $PREV_ARG \
            $ECMWF_ARG \
            $WAVE_ARG \
            --output-json keelung_summary_new.json \
            --output-html email_analysis.html \
            --email-html  email_analysis_email.html

      # ── Generate surf forecast & daily planner ────────────────────────────────
      # Fetches ECMWF + marine data for all 7 surf spots plus Keelung sailing,
      # writes surf_forecast.html, then appends it to email_analysis.html.
      # Runs independently of the WRF GRIB analysis (Open-Meteo only).
      - name: Generate surf forecast
        id: surf
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          # Full web-app version (both outputs combined into email_analysis.html for Drive/phone)
          python surf_forecast.py \
            --output surf_forecast.html \
            --email-output surf_forecast_email.html
          cat surf_forecast.html >> email_analysis.html

          # Simple email version (compact summary only)
          cat surf_forecast_email.html >> email_analysis_email.html

      # ── Upload archive + new summary to Drive ─────────────────────────────────
      - name: Upload to Google Drive
        id: upload
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          # Upload the GRIB2 archive
          rclone copy "${{ steps.download.outputs.archive_path }}" gdrive:WRF_Taiwan/ \
            --drive-chunk-size 128M \
            --transfers 1 \
            --stats 10s \
            --stats-one-line

          # Overwrite the persistent summary (used as prev-json next run)
          rclone copy keelung_summary_new.json \
            gdrive:WRF_Taiwan/keelung_summary.json \
            --no-traverse

          # Prune archives older than 7 days to keep Drive tidy
          rclone delete gdrive:WRF_Taiwan/ \
            --min-age 7d \
            --include "*.tar.gz" \
            --drive-use-trash=false \
            2>/dev/null || true

          # Get shareable link to the archive
          LINK=$(rclone link "gdrive:WRF_Taiwan/${{ steps.download.outputs.archive_name }}" 2>/dev/null || echo "")
          echo "drive_link=$LINK" >> "$GITHUB_OUTPUT"

      # ── Assemble the email HTML ───────────────────────────────────────────────
      # Combines the metadata header with the forecast table from wrf_analyze.py.
      # Uses heredoc syntax to safely pass multi-line HTML via GITHUB_OUTPUT.
      - name: Build email HTML
        id: email_html
        if: steps.stale_check.outputs.is_new == 'true'
        run: |
          DRIVE_CELL='gdrive:WRF_Taiwan/'
          if [ -n "${{ steps.upload.outputs.drive_link }}" ]; then
            DRIVE_CELL='<a href="${{ steps.upload.outputs.drive_link }}">Google Drive ↗</a>'
          fi

          # Write to a file instead of GITHUB_OUTPUT to avoid E2BIG / arg-list-too-long
          # when the action spawns Node with INPUT_HTML_BODY as an env var.
          {
            cat <<HEADER
          <div style="font-family:Arial,sans-serif;font-size:13px;margin-bottom:12px">
          <table cellpadding="5" style="border-collapse:collapse;background:#f0f4f8;border-radius:4px">
            <tr><td><b>Archive</b></td><td>${{ steps.download.outputs.archive_name }}</td></tr>
            <tr><td><b>Size</b></td><td>${{ steps.download.outputs.archive_size }}</td></tr>
            <tr><td><b>Triggered by</b></td><td>${{ github.event_name }}</td></tr>
            <tr><td><b>Workflow run</b></td>
                <td><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">#${{ github.run_number }}</a></td></tr>
            <tr><td><b>Download</b></td><td>$DRIVE_CELL</td></tr>
          </table>
          </div>
          <hr style="border:none;border-top:1px solid #e2e8f0;margin:12px 0">
          HEADER
            cat email_analysis_email.html
            cat /tmp/grib_vars_wrapped.html 2>/dev/null || true
          } > /tmp/email_body.html

      # ── Success notification ─────────────────────────────────────────────────
      # Requires two repository secrets: EMAIL_USERNAME and EMAIL_PASSWORD
      # (Gmail App Password — not your regular password)
      # Create one at: Google Account → Security → App passwords
      - name: Send success notification
        if: success() && steps.stale_check.outputs.is_new == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ WRF Taiwan — ${{ steps.download.outputs.archive_name }}"
          to: andrewshoe329@gmail.com
          from: "WRF Downloader <${{ secrets.EMAIL_USERNAME }}>"
          html_body: file:///tmp/email_body.html

      # ── Failure notification ─────────────────────────────────────────────────
      # Shows a per-step outcome table so you can tell at a glance which step
      # failed without digging through the Actions log.
      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ WRF Taiwan download FAILED — run #${{ github.run_number }}"
          to: andrewshoe329@gmail.com
          from: "WRF Downloader <${{ secrets.EMAIL_USERNAME }}>"
          html_body: |
            <h2 style="font-family:Arial,sans-serif;color:#c00;margin-bottom:8px">
              Taiwan WRF Download Failed
            </h2>
            <p style="font-family:Arial,sans-serif;font-size:13px;margin:0 0 16px">
              Workflow run <b>#${{ github.run_number }}</b>
              (<a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">view logs →</a>)
            </p>
            <table cellpadding="6"
                   style="font-family:Arial,sans-serif;font-size:13px;border-collapse:collapse;background:#fafafa;border:1px solid #e2e8f0;border-radius:4px">
              <tr style="background:#f0f4f8">
                <th align="left" style="padding:6px 12px">Step</th>
                <th align="left" style="padding:6px 12px">Outcome</th>
              </tr>
              <tr>
                <td style="padding:4px 12px">Download WRF data</td>
                <td style="padding:4px 12px">${{ steps.download.outcome == 'success' && '✅ success' || steps.download.outcome == 'failure' && '❌ FAILED' || '⏭️ skipped' }}</td>
              </tr>
              <tr style="background:#f7fafc">
                <td style="padding:4px 12px">Fetch ECMWF forecast</td>
                <td style="padding:4px 12px">${{ steps.ecmwf.outcome == 'success' && '✅ success' || steps.ecmwf.outcome == 'failure' && '❌ FAILED' || '⏭️ skipped' }}</td>
              </tr>
              <tr>
                <td style="padding:4px 12px">Fetch wave forecast</td>
                <td style="padding:4px 12px">${{ steps.wave.outcome == 'success' && '✅ success' || steps.wave.outcome == 'failure' && '❌ FAILED' || '⏭️ skipped' }}</td>
              </tr>
              <tr style="background:#f7fafc">
                <td style="padding:4px 12px">Analyze Keelung forecast</td>
                <td style="padding:4px 12px">${{ steps.analyze.outcome == 'success' && '✅ success' || steps.analyze.outcome == 'failure' && '❌ FAILED' || '⏭️ skipped' }}</td>
              </tr>
              <tr>
                <td style="padding:4px 12px">Upload to Google Drive</td>
                <td style="padding:4px 12px">${{ steps.upload.outcome == 'success' && '✅ success' || steps.upload.outcome == 'failure' && '❌ FAILED' || '⏭️ skipped' }}</td>
              </tr>
            </table>
