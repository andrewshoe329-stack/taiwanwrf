name: Taiwan WRF Download

permissions:
  contents: read

on:
  schedule:
    # Runs 45 min after each CWA model cycle (00/06/12/18 UTC)
    - cron: '45 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if CWA cycle is unchanged'
        required: false
        type: boolean
        default: false

concurrency:
  group: wrf-pipeline
  cancel-in-progress: true

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Cache pip downloads — saves ~4 s on repeated runs (eccodes wheel is large)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # Install ALL system deps + Python deps in a single apt pass.
      # --no-install-recommends shaves ~15 MB of docs/extras off the download.
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes-dev rclone
          pip install --quiet -r requirements.txt
          pip install --quiet pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      # Download, subset, and capture outputs for later steps.
      # taiwan_wrf_download.py writes rundir + init_utc to GITHUB_OUTPUT directly;
      # the shell commands below add archive_path / archive_name / archive_size as
      # a belt-and-suspenders fallback (identical values, different key names).
      # taiwan_wrf_download.py writes archive_name, archive_path, archive_size_mb,
      # rundir, and init_utc to GITHUB_OUTPUT directly.  The grep below reads
      # archive_path back from GITHUB_OUTPUT (since step outputs aren't available
      # within the same step) to add the human-readable archive_size.
      - name: Download and subset WRF data
        id: download
        timeout-minutes: 30
        run: |
          python taiwan_wrf_download.py --keelung-only --workers 8
          ARCHIVE=$(grep '^archive_path=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          if [ -n "$ARCHIVE" ] && [ -f "$ARCHIVE" ]; then
            echo "archive_size=$(du -sh "$ARCHIVE" | cut -f1)" >> "$GITHUB_OUTPUT"
          fi

      # Configure rclone from the stored secret
      - name: Configure rclone
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      # ── Pull previous run summary from Drive for delta comparison ─────────────
      # keelung_summary.json is stored at gdrive:WRF_Taiwan/keelung_summary.json
      # On the very first run this step silently produces nothing.
      - name: Fetch previous run summary
        id: prev_summary
        timeout-minutes: 5
        run: |
          rclone copy gdrive:WRF_Taiwan/keelung_summary.json . \
            --no-traverse 2>/dev/null || true
          if [ -f keelung_summary.json ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "  Previous summary fetched."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "  No previous summary found (first run?)."
          fi

      # ── Stale-run detection ───────────────────────────────────────────────────
      # Compare the CWA init_utc just downloaded against the one stored in the
      # previous summary.  If they match, the model hasn't published a new cycle
      # yet — skip everything downstream so we don't re-deploy or
      # re-upload identical data.
      - name: Check for new CWA run
        id: stale_check
        run: |
          NEW_INIT="${{ steps.download.outputs.init_utc }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "  ✅  Force flag set — skipping stale check."
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.prev_summary.outputs.found }}" = "true" ] && [ -f keelung_summary.json ]; then
            PREV_INIT=$(python3 -c \
              "import json,sys; d=json.load(open('keelung_summary.json')); print(d.get('meta',{}).get('init_utc',''))" \
              2>/dev/null || echo "")
            if [ -n "$PREV_INIT" ] && [ "$NEW_INIT" = "$PREV_INIT" ]; then
              echo "  ⏭  Same CWA init ($NEW_INIT) as previous run — skipping downstream steps."
              echo "is_new=false" >> "$GITHUB_OUTPUT"
            else
              echo "  ✅  New CWA run: $NEW_INIT  (prev: $PREV_INIT)"
              echo "is_new=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "  ✅  No previous summary — treating as new run."
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Fetch ECMWF IFS point forecast from Open-Meteo ───────────────────────
      # No API key required. Uses only stdlib so no extra pip install needed.
      # Produces ecmwf_keelung.json for side-by-side comparison with WRF.
      - name: Fetch ECMWF forecast
        id: ecmwf
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        run: |
          python ecmwf_fetch.py --output ecmwf_keelung.json
          echo "ecmwf_json=ecmwf_keelung.json" >> "$GITHUB_OUTPUT"

      # ── Fetch wave forecasts from Open-Meteo marine API ──────────────────────
      # Produces wave_keelung.json (ECMWF WAM wave data always; CWA wave if model
      # ID is known).  To add CWA wave data once you find the right model ID,
      # append:  --cwa-wave-model M-W0061  (or whatever the correct ID turns out
      # to be — run wave_fetch.py --cwa-wave-model <ID> --list-wave-vars locally
      # to probe the CWA S3 bucket and inspect the GRIB2 variable names).
      - name: Fetch wave forecast
        id: wave
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        run: |
          python wave_fetch.py --output wave_keelung.json
          echo "wave_json=wave_keelung.json" >> "$GITHUB_OUTPUT"

      # ── Predict tides for Keelung harbour ─────────────────────────────────────
      # Uses harmonic analysis (no API key needed). Produces tide_keelung.json.
      - name: Predict tides
        id: tide
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 2
        run: |
          python tide_predict.py --output tide_keelung.json --days 7

      # ── Fetch CWA real-time observations ──────────────────────────────────────
      # Station (Keelung #466940) + wave buoy (Longdong) + tide + warnings.
      # These are used by: AI summary (ground truth), accuracy tracking (buoy
      # verification), and the HTML display (current conditions).
      # Non-blocking: pipeline continues if CWA API is unavailable.
      - name: Fetch CWA observations
        id: cwa_obs
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 3
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          if [ -n "$CWA_OPENDATA_KEY" ]; then
            python cwa_fetch.py --output cwa_obs.json
            if [ -f cwa_obs.json ]; then
              echo "  ✅  CWA observations fetched"
              echo "cwa_obs_json=cwa_obs.json" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "  ⏭  No CWA_OPENDATA_KEY — skipping CWA observations"
          fi

      # ── Diagnostic: list GRIB2 variables in first subset file ────────────────
      # Captures the (shortName, typeOfLevel, level) inventory to a file so it
      # can be included in the HTML output.  Helps diagnose missing variables (gusts,
      # rain, cloud, vis, CAPE) without having to dig through Actions logs.
      - name: List GRIB2 variables (diagnostic)
        id: grib_vars
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          FIRST=$(ls "$RUNDIR"/*_keelung*.grb2 2>/dev/null | sort | head -1)
          if [ -n "$FIRST" ]; then
            echo "=== GRIB2 variable inventory: $(basename "$FIRST") ===" | tee /tmp/grib_vars.txt
            python wrf_analyze.py --rundir "$RUNDIR" --list-vars 2>&1 | tee -a /tmp/grib_vars.txt || true
          else
            echo "No keelung grb2 files found." | tee /tmp/grib_vars.txt
          fi
          # Wrap in an HTML <details> block and write to a temp file (not GITHUB_OUTPUT)
          # so it can be cat'd into the HTML output without hitting output size limits.
          {
            printf '<details style="margin-top:16px"><summary style="font-family:Arial,sans-serif;font-size:12px;color:#718096;cursor:pointer">🔍 GRIB2 variable inventory (click to expand)</summary>'
            printf '<pre style="font-family:monospace;font-size:11px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:4px;padding:8px;overflow-x:auto;margin:4px 0">'
            cat /tmp/grib_vars.txt | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            printf '</pre></details>\n'
          } > /tmp/grib_vars_wrapped.html

      # ── Fetch multi-model ensemble ─────────────────────────────────────────
      # GFS + ICON + JMA global models for confidence indicators.
      # Non-blocking: pipeline continues if ensemble fetch fails.
      - name: Fetch ensemble models
        id: ensemble
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        continue-on-error: true
        run: |
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          python ensemble_fetch.py $ECMWF_ARG --output ensemble_keelung.json

      # ── Generate surf forecast & planner JSON ───────────────────────────────
      # Fetches ECMWF + marine data for all 7 surf spots plus Keelung sailing.
      # Outputs: surf_forecast.html (spots section) + surf_planner.json (for day cards).
      # Runs BEFORE wrf_analyze so the planner JSON is available for unified day cards.
      - name: Generate surf forecast
        id: surf
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 10
        run: |
          python surf_forecast.py --output surf_forecast.html --output-json surf_planner.json

      # ── Run GRIB2 point-forecast analysis ────────────────────────────────────
      # Reads the Keelung subset .grb2 files, extracts the point forecast,
      # diffs against the previous run, and writes forecast.html.
      # Consumes surf_planner.json to build unified day cards (sailing + surf).
      - name: Analyze Keelung forecast
        id: analyze
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 10
        run: |
          RUNDIR="${{ steps.download.outputs.rundir }}"
          PREV_ARG=""
          if [ "${{ steps.prev_summary.outputs.found }}" = "true" ]; then
            PREV_ARG="--prev-json keelung_summary.json"
          fi
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          TIDE_ARG=""
          if [ -f tide_keelung.json ]; then
            TIDE_ARG="--tide-json tide_keelung.json"
          fi
          SURF_ARG=""
          if [ -f surf_planner.json ]; then
            SURF_ARG="--surf-json surf_planner.json"
          fi
          ENSEMBLE_ARG=""
          if [ -f ensemble_keelung.json ]; then
            ENSEMBLE_ARG="--ensemble-json ensemble_keelung.json"
          fi
          # Download accuracy log from Drive (for badge display)
          rclone copy gdrive:WRF_Taiwan/accuracy_log.json . 2>/dev/null || true
          ACCURACY_ARG=""
          if [ -f accuracy_log.json ]; then
            ACCURACY_ARG="--accuracy-log accuracy_log.json"
          fi
          python wrf_analyze.py \
            --rundir "$RUNDIR" \
            $PREV_ARG \
            $ECMWF_ARG \
            $WAVE_ARG \
            $TIDE_ARG \
            $SURF_ARG \
            $ENSEMBLE_ARG \
            $ACCURACY_ARG \
            --output-json keelung_summary_new.json \
            --output-html forecast.html
          # Append surf spots HTML to forecast
          if [ -f surf_forecast.html ]; then
            cat surf_forecast.html >> forecast.html
          fi

      # ── Generate AI forecast summary ──────────────────────────────────────────
      # Calls Anthropic API to produce a plain-English narrative from the
      # JSON forecast data.  Gracefully skips if API key is not set.
      - name: Generate AI forecast summary
        id: ai_summary
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ECMWF_ARG=""
          if [ -f ecmwf_keelung.json ]; then
            ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          ACCURACY_ARG=""
          if [ -f accuracy_log.json ]; then
            ACCURACY_ARG="--accuracy-log accuracy_log.json"
          fi
          CWA_ARG=""
          if [ -f cwa_obs.json ]; then
            CWA_ARG="--cwa-obs cwa_obs.json"
          fi
          ENSEMBLE_ARG=""
          if [ -f ensemble_keelung.json ]; then
            ENSEMBLE_ARG="--ensemble-json ensemble_keelung.json"
          fi
          python forecast_summary.py \
            --wrf-json keelung_summary_new.json \
            $ECMWF_ARG \
            $WAVE_ARG \
            $ACCURACY_ARG \
            $CWA_ARG \
            $ENSEMBLE_ARG \
            --output ai_summary.html

          # Prepend AI summary to the forecast HTML
          if [ -s ai_summary.html ] && [ -f forecast.html ]; then
            cat ai_summary.html forecast.html > forecast.html.tmp && mv forecast.html.tmp forecast.html
            echo "  ✅  AI summary prepended to forecast HTML"
          else
            echo "  ⏭  No AI summary generated (API key missing or error)"
          fi

      # ── Send threshold-based alerts ─────────────────────────────────────────
      # Sends LINE/Telegram notifications when dangerous conditions are forecast.
      # Non-blocking: pipeline continues if notification fails or no tokens set.
      - name: Send forecast alerts
        id: notify
        if: steps.stale_check.outputs.is_new == 'true'
        timeout-minutes: 2
        continue-on-error: true
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          python notify.py \
            --wrf-json keelung_summary_new.json \
            $WAVE_ARG

      # ── Track forecast accuracy ──────────────────────────────────────────────
      # Compares past forecast records against Open-Meteo + CWA observations.
      # Non-blocking: pipeline continues if accuracy check fails.
      - name: Track forecast accuracy
        id: accuracy
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 3
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          # accuracy_log.json was already downloaded by the Analyze step above;
          # reuse it from the working directory instead of re-downloading.
          EXISTING=""
          if [ -f accuracy_log.json ]; then
            EXISTING="--existing-log accuracy_log.json"
          fi
          WAVE_ARG=""
          if [ -f wave_keelung.json ]; then
            WAVE_ARG="--wave-json wave_keelung.json"
          fi
          # If CWA obs were already fetched earlier, pass the key so
          # accuracy_track can use live buoy data for wave verification
          python accuracy_track.py \
            --forecast-json keelung_summary_new.json \
            $EXISTING \
            $WAVE_ARG \
            --output accuracy_log.json
          echo "  ✅  Accuracy tracking complete"

      # ── Upload archive + new summary to Drive ─────────────────────────────────
      - name: Upload to Google Drive
        id: upload
        if: steps.stale_check.outputs.is_new == 'true'
        continue-on-error: true
        timeout-minutes: 15
        run: |
          # Upload the GRIB2 archive
          rclone copy "${{ steps.download.outputs.archive_path }}" gdrive:WRF_Taiwan/ \
            --drive-chunk-size 128M \
            --transfers 1 \
            --stats 10s \
            --stats-one-line

          # Overwrite the persistent summary (used as prev-json next run)
          # First remove any conflicting directory (Drive may have a folder named
          # keelung_summary.json from a past rclone copy — copyto needs a file target)
          rclone purge gdrive:WRF_Taiwan/keelung_summary.json 2>/dev/null || true
          rclone copyto keelung_summary_new.json \
            gdrive:WRF_Taiwan/keelung_summary.json \
            --no-traverse

          # Upload accuracy log (if generated)
          if [ -f accuracy_log.json ]; then
            rclone copyto accuracy_log.json \
              gdrive:WRF_Taiwan/accuracy_log.json \
              --no-traverse
          fi

          # Prune archives older than 7 days to keep Drive tidy
          rclone delete gdrive:WRF_Taiwan/ \
            --min-age 7d \
            --include "*.tar.gz" \
            --drive-use-trash=false \
            2>/dev/null || true

          # Get shareable link to the archive
          LINK=$(rclone link "gdrive:WRF_Taiwan/${{ steps.download.outputs.archive_name }}" 2>/dev/null || echo "")
          echo "drive_link=$LINK" >> "$GITHUB_OUTPUT"

      # ── Build & deploy to Vercel ──────────────────────────────────────────────
      # Wraps the generated HTML fragments in a proper HTML5 document with a
      # download link for the WRF GRIB2 archive, then deploys to Vercel.
      - name: Build Vercel site
        if: steps.stale_check.outputs.is_new == 'true' && !cancelled()
        timeout-minutes: 5
        run: |
          DRIVE_LINK="${{ steps.upload.outputs.drive_link }}"
          ARCHIVE_NAME="${{ steps.download.outputs.archive_name }}"
          ARCHIVE_SIZE="${{ steps.download.outputs.archive_size }}"
          BUILD_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p public
          # PWA + design system assets
          cp pwa/manifest.json pwa/sw.js pwa/icon-192.png pwa/icon-512.png pwa/styles.css public/
          cat <<HEADER > public/index.html
          <!DOCTYPE html>
          <html lang="en" id="html-root">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="1800">
            <meta name="theme-color" content="#0f172a">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
            <link rel="manifest" href="/manifest.json">
            <link rel="apple-touch-icon" href="/icon-192.png">
            <link rel="stylesheet" href="/styles.css">
            <title>Taiwan Sail & Surf Forecast | 台灣帆船衝浪預報</title>
            <script>
            // Language auto-detect: saved pref > browser language > English default
            (function(){
              var saved = localStorage.getItem('tw-forecast-lang');
              if (saved) { document.documentElement.setAttribute('lang', saved); return; }
              var bLang = (navigator.language || '').toLowerCase();
              if (bLang.startsWith('zh')) document.documentElement.setAttribute('lang', 'zh');
            })();
            </script>
          </head>
          <body>
          <a href="#main-content" class="skip-nav">Skip to content</a>

          <header class="site-header">
            <div class="header-inner">
              <h1 class="site-title">
                <span lang="en"><span class="highlight">Taiwan</span> Sail &amp; Surf</span>
                <span lang="zh"><span class="highlight">台灣</span> 帆船衝浪</span>
              </h1>
              <nav class="site-nav" aria-label="Main navigation">
                <a href="#summary"><span lang="en">Summary</span><span lang="zh">摘要</span></a>
                <a href="#week"><span lang="en">This Week</span><span lang="zh">本週</span></a>
                <a href="#spots"><span lang="en">Spots</span><span lang="zh">浪點</span></a>
                <a href="#detail"><span lang="en">Detail</span><span lang="zh">細節</span></a>
              </nav>
              <button class="lang-toggle" onclick="toggleLang()" aria-label="Switch language">
                <span lang="en">中文</span><span lang="zh">English</span>
              </button>
            </div>
            <div class="timestamp-bar">
              <span><span lang="en">Last updated</span><span lang="zh">最後更新</span>: <span id="ts">${BUILD_UTC}</span></span>
              <span class="age" id="age"></span>
            </div>
          </header>

          <div class="stale-warning" id="stale-warning" role="alert">
            <span lang="en">You are viewing cached data. Tap to refresh for the latest forecast.</span>
            <span lang="zh">您正在查看快取資料，點擊重新整理以獲取最新預報。</span>
            <button onclick="location.reload()"><span lang="en">Refresh</span><span lang="zh">重新整理</span></button>
          </div>

          <script>
          function toggleLang() {
            var html = document.documentElement;
            var next = html.getAttribute('lang') === 'zh' ? 'en' : 'zh';
            html.setAttribute('lang', next);
            localStorage.setItem('tw-forecast-lang', next);
          }
          (function(){
            var ts = new Date("${BUILD_UTC}");
            var el = document.getElementById("age");
            function update(){
              var h = Math.round((Date.now() - ts.getTime()) / 3600000);
              var m = Math.round((Date.now() - ts.getTime()) / 60000);
              if (m < 60) el.textContent = m + "m ago";
              else el.textContent = h + "h ago";
              el.className = "age " + (h < 8 ? "age-fresh" : h < 24 ? "age-stale" : "age-old");
              // Show prominent stale banner if data is very old (>12h)
              if (h >= 12) {
                var sw = document.getElementById("stale-warning");
                if (sw && !sw.classList.contains("visible")) {
                  var lang = document.documentElement.getAttribute('lang') || 'en';
                  var msg = lang === 'zh'
                    ? "預報資料已 " + h + " 小時未更新，系統可能發生錯誤。"
                    : "Forecast data is " + h + "h old. The pipeline may have failed.";
                  sw.querySelector("span[lang='" + lang + "']").textContent = msg;
                  sw.classList.add("visible");
                }
              }
            }
            update(); setInterval(update, 60000);

            // Listen for service worker cache-hit messages
            if (navigator.serviceWorker) {
              navigator.serviceWorker.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'CACHE_HIT') {
                  document.getElementById('stale-warning').classList.add('visible');
                }
              });
            }

            // Active nav tracking
            var sections = document.querySelectorAll('section[id]');
            var navLinks = document.querySelectorAll('.site-nav a');
            if (window.IntersectionObserver && sections.length) {
              var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                  if (entry.isIntersecting) {
                    navLinks.forEach(function(a) { a.classList.remove('active'); });
                    var link = document.querySelector('.site-nav a[href="#' + entry.target.id + '"]');
                    if (link) link.classList.add('active');
                  }
                });
              }, { rootMargin: '-20% 0px -60% 0px' });
              sections.forEach(function(s) { observer.observe(s); });
            }
          })();
          </script>
          HEADER

          # Add download bar if Drive link is available (HTML-escape variables)
          if [ -n "$DRIVE_LINK" ]; then
            SAFE_LINK=$(printf '%s' "$DRIVE_LINK" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g')
            SAFE_NAME=$(printf '%s' "$ARCHIVE_NAME" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            SAFE_SIZE=$(printf '%s' "$ARCHIVE_SIZE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            cat <<DLBAR >> public/index.html
          <div class="download-bar">
            <a href="$SAFE_LINK"><span lang="en">Download WRF Data</span><span lang="zh">下載 WRF 資料</span></a>
            <span>$SAFE_NAME · $SAFE_SIZE</span>
          </div>
          DLBAR
          fi

          echo '<main id="main-content" class="content-wrap">' >> public/index.html
          cat forecast.html >> public/index.html
          echo '</main>' >> public/index.html
          cat <<'SWREG' >> public/index.html
          <script>
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function(){});
          }
          </script>
          SWREG
          echo '</body></html>' >> public/index.html

      - name: Deploy to Vercel
        if: steps.stale_check.outputs.is_new == 'true' && !cancelled()
        timeout-minutes: 10
        run: |
          npm install -g vercel@39.3.0
          if vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel_output.txt; then
            echo "Deploy succeeded"
          elif grep -qi 'rate\|429\|too many\|throttl' /tmp/vercel_output.txt; then
            echo "::warning::Vercel deploy rate limited — will retry on next scheduled run"
          else
            echo "::error::Vercel deploy failed"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
