name: Forecast Pipeline

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["WRF Download & Analysis"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: forecast-pipeline
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libeccodes-dev
          pip install --quiet -r requirements.txt
          pip install --quiet pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Configure Firebase credentials
        env:
          SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
        run: |
          if [ -n "$SA_KEY" ]; then
            echo "$SA_KEY" > /tmp/firebase-sa-key.json
            chmod 600 /tmp/firebase-sa-key.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa-key.json" >> "$GITHUB_ENV"
            echo "FIREBASE_PROJECT=$FIREBASE_PROJECT" >> "$GITHUB_ENV"
            echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> "$GITHUB_ENV"
          fi

      # Download WRF summary from Firebase (produced by wrf.yml).
      # Reject summaries older than STALE_MAX_HOURS so we don't deploy a
      # week-old init_utc when the WRF pipeline has been silently failing.
      - name: Fetch WRF summary from Firebase
        id: wrf_summary
        timeout-minutes: 5
        env:
          STALE_MAX_HOURS: '18'
        run: |
          python firebase_storage.py download-summary \
            --output keelung_summary_new.json 2>/dev/null || true
          if [ ! -f keelung_summary_new.json ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No WRF summary in Firebase — forecast will use ECMWF only"
            exit 0
          fi
          AGE_H=$(python3 -c "
          import json, sys
          from datetime import datetime, timezone
          try:
              d = json.load(open('keelung_summary_new.json'))
              init = d.get('meta', {}).get('init_utc')
              if not init:
                  print('999'); sys.exit(0)
              dt = datetime.fromisoformat(init)
              age = (datetime.now(timezone.utc) - dt).total_seconds() / 3600
              print(f'{age:.1f}')
          except Exception:
              print('999')
          ")
          echo "age_hours=$AGE_H" >> "$GITHUB_OUTPUT"
          if python3 -c "import sys; sys.exit(0 if float('$AGE_H') > float('$STALE_MAX_HOURS') else 1)"; then
            echo "::warning::WRF summary is ${AGE_H}h old (>${STALE_MAX_HOURS}h) — dropping; forecast will use ECMWF only"
            rm -f keelung_summary_new.json wrf_spots.json
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "WRF summary age: ${AGE_H}h"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      # Download WRF per-spot data from Firebase (produced by wrf.yml).
      # Skip when the WRF summary was rejected as stale — the spots would
      # be from the same stale run.
      - name: Fetch WRF spots data from Firebase
        if: steps.wrf_summary.outputs.found == 'true'
        continue-on-error: true
        timeout-minutes: 3
        run: |
          python firebase_storage.py download-wrf-spots \
            --output wrf_spots.json 2>/dev/null || true

      # Download accuracy log from Firebase
      - name: Fetch accuracy log
        timeout-minutes: 3
        run: |
          python firebase_storage.py download-accuracy-log \
            --output accuracy_log.json 2>/dev/null || true

      # ── Fetch all data sources (parallelized) ─────────────────────────────

      - name: Fetch forecasts in parallel (ECMWF, wave, tide, CWA, grids)
        continue-on-error: true
        timeout-minutes: 15
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          mkdir -p frontend/public/data

          # Launch independent fetches in parallel
          python ecmwf_fetch.py --output ecmwf_keelung.json &
          PID_ECMWF=$!
          python wave_fetch.py --output wave_keelung.json &
          PID_WAVE=$!
          python tide_predict.py --output tide_keelung.json --days 7 &
          PID_TIDE=$!
          python wind_grid_fetch.py --output-dir frontend/public/data &
          PID_WGRID=$!
          python wave_grid_fetch.py --output-dir frontend/public/data &
          PID_WAVEGRID=$!
          python current_grid_fetch.py --output-dir frontend/public/data &
          PID_CGRID=$!
          if [ -n "$CWA_OPENDATA_KEY" ]; then
            python cwa_fetch.py --output cwa_obs.json &
            PID_CWA=$!
          fi

          # Wait for all fetches (allow individual failures)
          wait $PID_ECMWF || echo "::warning::ECMWF fetch failed"
          wait $PID_WAVE || echo "::warning::Wave fetch failed"
          wait $PID_TIDE || echo "::warning::Tide prediction failed"
          wait $PID_WGRID || echo "::warning::Wind grid fetch failed"
          wait $PID_WAVEGRID || echo "::warning::Wave grid fetch failed"
          wait $PID_CGRID || echo "::warning::Current grid fetch failed"
          [ -n "${PID_CWA:-}" ] && (wait $PID_CWA || echo "::warning::CWA fetch failed")
          true  # Don't fail the step

      - name: Fetch ensemble models (depends on ECMWF)
        continue-on-error: true
        timeout-minutes: 10
        run: |
          ECMWF_ARG=""; [ -f ecmwf_keelung.json ] && ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          python ensemble_fetch.py $ECMWF_ARG --all-locations --output ensemble_keelung.json

      - name: Check critical data availability
        run: |
          if [ ! -f ecmwf_keelung.json ]; then
            echo "::error::ECMWF data missing — cannot generate meaningful forecast"
            exit 1
          fi
          [ ! -f wave_keelung.json ] && echo "::warning::Wave data missing — forecast will lack wave info"
          true

      # ── Generate surf forecast ────────────────────────────────────────────

      - name: Generate surf forecast
        timeout-minutes: 10
        run: |
          CWA_TIDE_ARG=""
          if [ -f cwa_obs.json ]; then
            CWA_TIDE_ARG="--cwa-obs cwa_obs.json"
          fi
          ECMWF_ARG=""; [ -f ecmwf_keelung.json ] && ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          WAVE_ARG=""; [ -f wave_keelung.json ] && WAVE_ARG="--wave-json wave_keelung.json"
          python surf_forecast.py \
            --output surf_forecast.html \
            --output-json surf_planner.json \
            --output-frontend-json surf_frontend.json \
            --output-dir public \
            $CWA_TIDE_ARG $ECMWF_ARG $WAVE_ARG

      # ── AI forecast summary ──────────────────────────────────────────────

      - name: Generate AI forecast summary
        continue-on-error: true
        timeout-minutes: 15
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          WRF_ARG=""; [ -f keelung_summary_new.json ] && WRF_ARG="--wrf-json keelung_summary_new.json"
          ECMWF_ARG=""; [ -f ecmwf_keelung.json ] && ECMWF_ARG="--ecmwf-json ecmwf_keelung.json"
          WAVE_ARG=""; [ -f wave_keelung.json ] && WAVE_ARG="--wave-json wave_keelung.json"
          ACCURACY_ARG=""; [ -f accuracy_log.json ] && ACCURACY_ARG="--accuracy-log accuracy_log.json"
          CWA_ARG=""; [ -f cwa_obs.json ] && CWA_ARG="--cwa-obs cwa_obs.json"
          ENSEMBLE_ARG=""; [ -f ensemble_keelung.json ] && ENSEMBLE_ARG="--ensemble-json ensemble_keelung.json"
          if [ -n "$WRF_ARG" ]; then
            python forecast_summary.py \
              $WRF_ARG $ECMWF_ARG $WAVE_ARG $ACCURACY_ARG $CWA_ARG $ENSEMBLE_ARG \
              --output ai_summary.html \
              --output-json ai_summary.json
          else
            echo "::warning::No WRF summary — skipping AI forecast"
          fi

      - name: Ensure AI summary exists
        run: |
          if [ ! -f ai_summary.json ]; then
            echo '{"generated_utc":"","sections":{},"full_text":{"en":"AI summary unavailable for this cycle.","zh":"本次無 AI 摘要。"}}' > ai_summary.json
            echo "::warning::AI summary missing — using placeholder"
          fi

      # ── Alerts & accuracy tracking ───────────────────────────────────────

      - name: Send forecast alerts
        continue-on-error: true
        timeout-minutes: 2
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f keelung_summary_new.json ]; then
            WAVE_ARG=""; [ -f wave_keelung.json ] && WAVE_ARG="--wave-json wave_keelung.json"
            python notify.py --wrf-json keelung_summary_new.json $WAVE_ARG
          fi

      - name: Track forecast accuracy
        continue-on-error: true
        timeout-minutes: 3
        env:
          CWA_OPENDATA_KEY: ${{ secrets.CWA_OPENDATA_KEY }}
        run: |
          if [ -f keelung_summary_new.json ]; then
            EXISTING=""; [ -f accuracy_log.json ] && EXISTING="--existing-log accuracy_log.json"
            WAVE_ARG=""; [ -f wave_keelung.json ] && WAVE_ARG="--wave-json wave_keelung.json"
            CWA_OBS_ARG=""; [ -f cwa_obs.json ] && CWA_OBS_ARG="--cwa-obs-json cwa_obs.json"
            python accuracy_track.py \
              --forecast-json keelung_summary_new.json \
              $EXISTING $WAVE_ARG $CWA_OBS_ARG \
              --output accuracy_log.json
          fi

      - name: Upload accuracy log to Firebase
        continue-on-error: true
        timeout-minutes: 5
        run: |
          if [ -f accuracy_log.json ]; then
            python firebase_storage.py upload-accuracy-log \
              --input accuracy_log.json
          fi

      - name: Archive daily summary
        continue-on-error: true
        timeout-minutes: 2
        run: |
          python -c "
          from firebase_storage import archive_daily_summary
          from config import load_json_file
          s = load_json_file('keelung_summary_new.json')
          w = load_json_file('wave_keelung.json')
          if s: archive_daily_summary(s, w)
          "

      - name: Record pipeline health
        if: always()
        continue-on-error: true
        timeout-minutes: 1
        env:
          WRF_FRESH: ${{ steps.wrf_summary.outputs.found }}
          WRF_AGE_H: ${{ steps.wrf_summary.outputs.age_hours }}
        run: |
          python -c "
          from firebase_storage import record_pipeline_health
          import os
          try:
              age = float(os.environ.get('WRF_AGE_H') or 'nan')
          except ValueError:
              age = None
          record_pipeline_health(
              os.environ.get('GITHUB_RUN_ID', 'local'),
              {'ecmwf': os.path.exists('ecmwf_keelung.json'),
               'wave': os.path.exists('wave_keelung.json'),
               'surf': os.path.exists('surf_frontend.json'),
               'ai_summary': os.path.exists('ai_summary.json'),
               'accuracy': os.path.exists('accuracy_log.json'),
               'wrf_fresh': os.environ.get('WRF_FRESH') == 'true',
               'wrf_age_hours': age}
          )
          "

      # ── Upload artifacts for deploy workflow ─────────────────────────────

      - name: Prepare data artifacts
        if: "!cancelled()"
        run: |
          mkdir -p frontend/public/data
          for f in keelung_summary_new.json ecmwf_keelung.json wave_keelung.json \
                   tide_keelung.json ensemble_keelung.json cwa_obs.json accuracy_log.json; do
            if [ -f "$f" ]; then
              DEST=$(echo "$f" | sed 's/_keelung//; s/_summary_new//; s/accuracy_log/accuracy/')
              cp "$f" "frontend/public/data/$DEST"
            fi
          done
          [ -f surf_frontend.json ] && cp surf_frontend.json frontend/public/data/surf.json
          [ -f ai_summary.json ] && cp ai_summary.json frontend/public/data/summary.json
          [ -f wrf_spots.json ] && cp wrf_spots.json frontend/public/data/wrf_spots.json

      - name: Upload forecast data
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: forecast-data
          path: frontend/public/data/
          retention-days: 1
